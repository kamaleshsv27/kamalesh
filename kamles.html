<!DOCTYPE html>
<html>
<head>
    <title>PrivacyGuard Pro</title>

    <!-- Chart.js -->
    <script src="https://cdn.jsdelivr.net/npm/chart.js"></script>

    <style>
        body {
            margin: 0;
            font-family: 'Courier New', monospace;
            background: radial-gradient(circle, #020617, #000);
            color: #00ffcc;
            display: flex;
            justify-content: center;
            align-items: center;
            height: 100vh;
            overflow: hidden;
        }

        /* Matrix background effect */
        canvas {
            position: fixed;
            top: 0;
            left: 0;
            z-index: -1;
        }

        .box {
            background: rgba(0,0,0,0.8);
            padding: 30px;
            border-radius: 10px;
            box-shadow: 0 0 20px #00ffcc;
            width: 320px;
            text-align: center;
            animation: fade 1s ease;
        }

        input {
            width: 90%;
            padding: 10px;
            margin: 10px;
            background: black;
            border: 1px solid #00ffcc;
            color: #00ffcc;
        }

        button {
            padding: 10px;
            width: 95%;
            background: #00ffcc;
            border: none;
            cursor: pointer;
            margin-top: 10px;
        }

        button:hover {
            background: #00ffaa;
            transform: scale(1.05);
        }

        a { cursor: pointer; color: #00ffaa; }

        .hidden { display: none; }

        @keyframes fade {
            from {opacity:0; transform:translateY(20px);}
            to {opacity:1;}
        }
    </style>
</head>
<body>

<!-- Matrix Effect -->
<canvas id="matrix"></canvas>

<!-- LOGIN -->
<div class="box" id="loginBox">
    <h2>🔐 LOGIN</h2>
    <input id="user" placeholder="Username">
    <input id="pass" type="password" placeholder="Password">
    <button onclick="login()">Access</button>
    <p><a onclick="showRegister()">Register</a></p>
</div>

<!-- REGISTER -->
<div class="box hidden" id="registerBox">
    <h2>📝 REGISTER</h2>
    <input id="ruser" placeholder="Username">
    <input id="rpass" type="password" placeholder="Password">
    <button onclick="register()">Create</button>
    <p><a onclick="showLogin()">Back</a></p>
</div>

<!-- DASHBOARD -->
<div class="box hidden" id="dashboard">
    <h2>📊 DASHBOARD</h2>
    <p id="status">System Secure ✅</p>

    <canvas id="chart"></canvas>

    <button onclick="simulate()">Simulate Attack</button>
    <button onclick="logout()">Logout</button>
</div>

<script>
/* Matrix Animation */
let c = document.getElementById("matrix");
let ctx = c.getContext("2d");

c.height = window.innerHeight;
c.width = window.innerWidth;

let letters = "01";
let fontSize = 14;
let columns = c.width / fontSize;
let drops = [];

for(let x=0; x<columns; x++) drops[x]=1;

function draw(){
    ctx.fillStyle="rgba(0,0,0,0.05)";
    ctx.fillRect(0,0,c.width,c.height);

    ctx.fillStyle="#0f0";
    ctx.font=fontSize+"px monospace";

    for(let i=0;i<drops.length;i++){
        let text=letters[Math.floor(Math.random()*letters.length)];
        ctx.fillText(text,i*fontSize,drops[i]*fontSize);

        if(drops[i]*fontSize>c.height && Math.random()>0.975)
            drops[i]=0;

        drops[i]++;
    }
}
setInterval(draw,33);

/* Navigation */
function showRegister(){
    loginBox.classList.add("hidden");
    registerBox.classList.remove("hidden");
}
function showLogin(){
    registerBox.classList.add("hidden");
    loginBox.classList.remove("hidden");
}

/* Register */
function register(){
    localStorage.setItem("user", ruser.value);
    localStorage.setItem("pass", rpass.value);
    alert("Registered ✅");
    showLogin();
}

/* Login */
function login(){
    if(user.value === localStorage.getItem("user") &&
       pass.value === localStorage.getItem("pass")){
        loginBox.classList.add("hidden");
        dashboard.classList.remove("hidden");
        loadChart();
    } else {
        alert("Access Denied ❌");
    }
}

/* Dashboard Chart */
function loadChart(){
    new Chart(document.getElementById("chart"), {
        type: 'bar',
        data: {
            labels: ['Camera','Mic','Location'],
            datasets: [{
                label: 'Access Count',
                data: [1,2,1]
            }]
        }
    });
}

/* Simulate Attack */
function simulate(){
    document.getElementById("status").innerText="⚠️ Device Breached!";
}

/* Logout */
function logout(){
    dashboard.classList.add("hidden");
    loginBox.classList.remove("hidden");
}
</script>

</body>
</html>
